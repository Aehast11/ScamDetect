<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scam Detect</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-xl w-full border-2 border-slate-700">
        <h1 class="text-4xl font-black mb-3 text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-500 text-center tracking-tight">
            Scam Detect
        </h1>
        <p class="text-slate-300 text-center text-lg mb-8 font-medium">
            Not sure if a text message or email is real? Let us check it for you.
        </p>

        <div class="bg-slate-900/50 p-4 rounded-xl mb-6 border border-slate-700/50 text-sm text-slate-400">
            <p class="font-bold text-slate-200 mb-1">How to use this:</p>
            <ol class="list-decimal list-inside space-y-1">
                <li>Take a screenshot or photo of the suspicious message.</li>
                <li>Click the button below to upload that photo.</li>
                <li>Press the big orange "Scan Message Now" button.</li>
            </ol>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-bold uppercase tracking-wider text-slate-300 mb-2">1. Choose your photo:</label>
            <input type="file" id="imageInput" accept="image/*" 
                   class="block w-full text-base text-slate-300 file:mr-4 file:py-4 file:px-6 file:rounded-xl file:border-0 file:text-base file:font-bold file:bg-orange-950 file:text-orange-400 hover:file:bg-orange-900 file:cursor-pointer border-2 border-dashed border-slate-600 rounded-xl p-2 bg-slate-900/30" />
        </div>
        
        <button id="analyzeBtn" class="w-full bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700 text-white font-black text-xl py-4 px-6 rounded-xl transition duration-200 shadow-lg shadow-orange-500/20 tracking-wide uppercase">
            2. Scan Message Now
        </button>
        
        <div id="status" class="mt-8 text-center text-lg text-orange-400 font-bold hidden flex items-center justify-center gap-3">
            <svg class="animate-spin h-6 w-6 text-orange-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="statusText">Reading the text in your image...</span>
        </div>
        
        <div id="resultBox" class="mt-8 p-6 rounded-xl hidden border-4 shadow-xl">
            <h3 id="resultVerdict" class="text-2xl font-black mb-3 tracking-wide uppercase"></h3>
            <p id="resultAnalysis" class="text-base text-slate-100 font-medium leading-relaxed bg-slate-900/40 p-4 rounded-lg border border-slate-700/50"></p>
        </div>
    </div>

    <script>
        // TOGETHER THESE MAKE YOUR GROQ KEY. 
        // Example: If your key is gsk_123456, make part1 = "gsk_123" and part2 = "456"
        const part1 = "PASTE_FIRST_HALF_OF_GROQ_KEY_HERE";
        const part2 = "PASTE_SECOND_HALF_OF_GROQ_KEY_HERE";
        const apiKey = part1 + part2;

        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('imageInput');
            const statusDiv = document.getElementById('status');
            const statusText = document.getElementById('statusText');
            const resultBox = document.getElementById('resultBox');
            const resultVerdict = document.getElementById('resultVerdict');
            const resultAnalysis = document.getElementById('resultAnalysis');
            
            if (fileInput.files.length === 0) {
                alert('Please pick a photo first by clicking the "Choose file" button.');
                return;
            }

            statusDiv.classList.remove('hidden');
            resultBox.classList.add('hidden');
            statusText.innerText = "Reading the text in your photo...";

            try {
                const ocrResult = await Tesseract.recognize(fileInput.files[0], 'eng');
                const extractedText = ocrResult.data.text;

                if (!extractedText.trim()) {
                    throw new Error("We couldn't read any text. Please make sure the photo is clear and bright.");
                }

                statusText.innerText = "Checking for scams... Please wait.";

                const systemPrompt = "You are a patient, expert cybersecurity analyst protecting elderly users. Analyze this text extracted from a user's screenshot. Determine if it is Official, Suspicious, or a Scam. Respond in exactly this JSON format: {\"verdict\": \"Official | Suspicious | Scam\", \"explanation\": \"Your 2-3 sentence analysis written in clear, simple language suitable for senior citizens.\"}";

                // Direct fetch to Groq from the frontend
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        response_format: { type: "json_object" }, 
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: `User Text:\n${extractedText}` }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error('The system is busy. Please try again.');
                }

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content.trim());

                resultBox.classList.remove('hidden');
                resultAnalysis.innerText = result.explanation;

                if (result.verdict.toLowerCase().includes('scam')) {
                    resultVerdict.innerText = "🛑 DANGER: THIS IS A SCAM";
                    resultBox.className = "mt-8 p-6 rounded-xl border-red-500 bg-red-950/40 text-red-400 shadow-red-900/20";
                } else if (result.verdict.toLowerCase().includes('suspicious')) {
                    resultVerdict.innerText = "🟡 WARNING: THIS LOOKS SUSPICIOUS";
                    resultBox.className = "mt-8 p-6 rounded-xl border-yellow-500 bg-yellow-950/40 text-yellow-400 shadow-yellow-900/20";
                } else {
                    resultVerdict.innerText = "🟢 SAFE: THIS LOOKS OFFICIAL";
                    resultBox.className = "mt-8 p-6 rounded-xl border-green-500 bg-green-950/40 text-green-400 shadow-green-900/20";
                }

            } catch (err) {
                alert('Notice: ' + err.message);
                console.error(err);
            } finally {
                statusDiv.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
