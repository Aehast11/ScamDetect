<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-xl w-full border-2 border-slate-700">

        </p>

            <p class="font-bold text-slate-200 mb-1">How to use this:</p>
            <ol class="list-decimal list-inside space-y-1">
                <li>Take a screenshot or photo of the suspicious message.</li>
                <li>Click the button below to upload that photo.</li>
                <li>Press the big orange "Scan Message Now" button.</li>
            </ol>
        </div>

        <div class="mb-6">

        </div>
        
        <button id="analyzeBtn" class="w-full bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700 text-white font-black text-xl py-4 px-6 rounded-xl transition duration-200 shadow-lg shadow-orange-500/20 tracking-wide uppercase">
            2. Scan Message Now
        </button>
        
        <div id="status" class="mt-8 text-center text-lg text-orange-400 font-bold hidden flex items-center justify-center gap-3">

                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="statusText">Reading the text in your image...</span>
        </div>
        
        <div id="resultBox" class="mt-8 p-6 rounded-xl hidden border-4 shadow-xl">
            <h3 id="resultVerdict" class="text-2xl font-black mb-3 tracking-wide uppercase"></h3>
            <p id="resultAnalysis" class="text-base text-slate-100 font-medium leading-relaxed bg-slate-900/40 p-4 rounded-lg border border-slate-700/50"></p>
        </div>
    </div>
